{% extends 'base.html' %}
{% block title %}Éditer un achat{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <h1>Éditer un achat</h1>
        <p>Modifie les informations de cet achat.</p>
    </div>
    <a href="{{ url_for('main.purchases') }}" class="btn btn-ghost">← Retour</a>
</div>

<div class="card form-card">
    <form method="POST">

        <div class="form-group">
            <label>Actif</label>
            <input type="text" value="{{ purchase['ticker'] }} — {{ purchase['name'] if purchase.get('name') else purchase['ticker'] }}"
                   disabled style="background:rgba(74,122,155,0.04); color:rgba(232,240,255,0.30); cursor:not-allowed;">
            <div class="form-hint">L'actif ne peut pas être modifié.</div>
        </div>

        <div class="form-group">
            <label for="date">Date d'achat</label>
            <input type="date" id="date" name="date" value="{{ purchase['date'] }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="shares">Nombre de parts</label>
                <input type="number" id="shares" name="shares"
                       step="0.000001" min="0.000001" required
                       value="{{ purchase['shares'] }}"
                       oninput="calcTotal()">
            </div>
            <div class="form-group">
                <label for="price_per_share">Prix par part</label>
                <input type="number" id="price_per_share" name="price_per_share"
                       step="0.0001" min="0.0001" required
                       value="{{ purchase['price_per_share'] }}"
                       oninput="calcTotal()">
            </div>
        </div>

        <div class="form-group">
            <label>Montant total</label>
            <div id="total-display" style="
                padding: 0.65rem 0.9rem;
                background: rgba(74,122,155,0.06);
                border: 1px solid #1a2a3a;
                border-radius: 10px;
                font-size: 1.1rem;
                font-weight: 700;
                color: #e8f0ff;
            ">{{ purchase['total_cost'] }} €</div>
            <div class="form-hint">Calculé automatiquement (parts × prix).</div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="fees">Frais de courtage</label>
                <input type="number" id="fees" name="fees"
                       step="0.01" min="0"
                       value="{{ purchase['fees'] or 0 }}"
                       placeholder="ex: 1.99">
            </div>
            <div class="form-group">
                <label for="notes">Note <span style="font-weight:400; color:rgba(232,240,255,0.30);">(optionnel)</span></label>
                <input type="text" id="notes" name="notes"
                       value="{{ purchase['notes'] or '' }}"
                       placeholder="ex: Achat mensuel DCA">
            </div>
        </div>

        <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
            <a href="{{ url_for('main.purchases') }}" class="btn btn-ghost">Annuler</a>
        </div>

    </form>
</div>

<script>
function calcTotal() {
    const shares = parseFloat(document.getElementById('shares').value) || 0;
    const price  = parseFloat(document.getElementById('price_per_share').value) || 0;
    const el     = document.getElementById('total-display');
    el.textContent = shares > 0 && price > 0 ? (shares * price).toFixed(4) + ' €' : '—';
}
</script>

{% endblock %}
