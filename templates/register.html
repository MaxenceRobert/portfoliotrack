<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — PortfolioTrack</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/terminal.css') }}">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    background: #000000;
    font-family: 'IBM Plex Mono', monospace;
    color: #C8C8C8;
    -webkit-font-smoothing: antialiased;
}
.auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
}
.auth-panel {
    width: 100%;
    max-width: 380px;
    background: #0A0A0A;
    border: 1px solid #1E1E1E;
}
.auth-logo {
    padding: 24px 28px 20px;
    border-bottom: 1px solid #1E1E1E;
    text-align: center;
}
.auth-brand {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #FF8C00;
    text-transform: uppercase;
    text-decoration: none;
    display: block;
    margin-bottom: 4px;
}
.auth-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #666666;
    letter-spacing: 1px;
    text-transform: uppercase;
}
.auth-body { padding: 24px 28px; }
.auth-flash { margin-bottom: 16px; }
.auth-flash-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 8px 12px;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
    line-height: 1.5;
}
.auth-flash-item.success { background: rgba(0,200,83,0.08); border-left: 2px solid #00C853; color: #00C853; }
.auth-flash-item.error,
.auth-flash-item.danger  { background: rgba(255,23,68,0.08); border-left: 2px solid #FF1744; color: #FF1744; }
.auth-flash-item.warning { background: rgba(255,214,0,0.08); border-left: 2px solid #FFD600; color: #FFD600; }
.auth-flash-item.info    { background: rgba(68,138,255,0.08); border-left: 2px solid #448AFF; color: #448AFF; }
.auth-field { margin-bottom: 16px; }
.auth-label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    color: #666666;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
}
.auth-input {
    width: 100%;
    background: #000000;
    border: 1px solid #1E1E1E;
    border-bottom: 2px solid #2A2A2A;
    color: #FFFFFF;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 9px 10px;
    outline: none;
    transition: border-bottom-color 0.1s;
    box-sizing: border-box;
}
.auth-input:focus { border-bottom-color: #FF8C00; }
.auth-input::placeholder { color: #333333; }
.auth-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: #444444;
    margin-top: 4px;
    letter-spacing: 0.3px;
}
.auth-btn {
    display: block;
    width: 100%;
    background: #FF8C00;
    border: none;
    color: #000000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.1s;
}
.auth-btn:hover { opacity: 0.88; }
.auth-footer {
    text-align: center;
    padding: 16px 28px 20px;
    border-top: 1px solid #1E1E1E;
}
.auth-footer-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: #666666;
}
.auth-footer-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: #FF8C00;
    text-decoration: none;
    font-weight: 700;
    transition: opacity 0.1s;
}
.auth-footer-link:hover { opacity: 0.8; }
/* ── Password strength ── */
.pw-strength-bar {
    height: 2px;
    background: #1E1E1E;
    margin-top: 6px;
    overflow: hidden;
}
.pw-strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.2s, background 0.2s;
}
.pw-strength-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    color: #444444;
    margin-top: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    height: 10px;
}
.auth-status {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 20px;
    background: #050505;
    border-top: 1px solid #1E1E1E;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
}
.auth-status-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: #333333;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}
.auth-status-item.green { color: #00C853; }
</style>
</head>
<body>

<div class="auth-screen">
    <div class="auth-panel">

        <!-- Logo -->
        <div class="auth-logo">
            <a href="{{ url_for('main.landing') }}" class="auth-brand">PortfolioTrack</a>
            <span class="auth-subtitle">Terminal · Inscription</span>
        </div>

        <!-- Body -->
        <div class="auth-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="auth-flash">
                {% for category, message in messages %}
                <div class="auth-flash-item {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST">

                <!-- Email -->
                <div class="auth-field">
                    <label class="auth-label" for="email">Email</label>
                    <input class="auth-input" type="email" id="email" name="email"
                           required placeholder="terminal@domain.com" autofocus>
                </div>

                <!-- Password -->
                <div class="auth-field">
                    <label class="auth-label" for="password">Mot de passe</label>
                    <input class="auth-input" type="password" id="password" name="password"
                           required placeholder="8 caractères minimum" oninput="checkStrength(this.value)">
                    <div class="pw-strength-bar">
                        <div class="pw-strength-fill" id="pw-fill"></div>
                    </div>
                    <div class="pw-strength-label" id="pw-label"></div>
                </div>

                <!-- Confirm password -->
                <div class="auth-field">
                    <label class="auth-label" for="confirm_password">Confirmer le mot de passe</label>
                    <input class="auth-input" type="password" id="confirm_password" name="confirm_password"
                           required placeholder="••••••••">
                </div>

                <button type="submit" class="auth-btn">S'inscrire</button>

            </form>

        </div><!-- /.auth-body -->

        <!-- Footer -->
        <div class="auth-footer">
            <span class="auth-footer-text">Déjà un compte ? &nbsp;</span>
            <a href="{{ url_for('auth.login') }}" class="auth-footer-link">Se connecter →</a>
        </div>

    </div>
</div>

<!-- Status bar -->
<div class="auth-status">
    <span class="auth-status-item green">● ONLINE</span>
    <span class="auth-status-item">PortfolioTrack v1.0</span>
    <span class="auth-status-item" id="auth-clock"></span>
</div>

<script>
(function() {
    function tick() {
        var d = new Date();
        var h = String(d.getHours()).padStart(2,'0');
        var m = String(d.getMinutes()).padStart(2,'0');
        var s = String(d.getSeconds()).padStart(2,'0');
        var el = document.getElementById('auth-clock');
        if (el) el.textContent = h + ':' + m + ':' + s;
    }
    tick(); setInterval(tick, 1000);
})();

function checkStrength(pw) {
    var fill  = document.getElementById('pw-fill');
    var label = document.getElementById('pw-label');
    var score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    var pct   = [0, 20, 45, 65, 82, 100][score];
    var color = ['#1E1E1E','#FF1744','#FF8C00','#FFD600','#00C853','#00C853'][score];
    var text  = ['','FAIBLE','FAIBLE','MOYEN','FORT','TRÈS FORT'][score];
    fill.style.width     = pct + '%';
    fill.style.background = color;
    label.textContent    = pw.length > 0 ? text : '';
    label.style.color    = color;
}
</script>

</body>
</html>
