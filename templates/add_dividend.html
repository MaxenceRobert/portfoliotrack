{% extends 'base.html' %}
{% block title %}Enregistrer un dividende{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <h1>Enregistrer un dividende</h1>
        <p>Montant net reçu après prélèvements fiscaux.</p>
    </div>
    <div class="page-header-actions">
        <a href="{{ url_for('main.history') }}" class="btn btn-ghost">← Historique</a>
    </div>
</div>

<div class="card form-card">
    <div class="card-head"><span class="card-title">Détails du dividende</span></div>

    <form method="POST">

        <div class="form-group">
            <label for="asset_id">Actif</label>
            <select id="asset_id" name="asset_id" required>
                {% for a in assets %}
                <option value="{{ a['id'] }}">{{ a['ticker'] }} — {{ a['name'] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="date">Date de réception</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
            <label for="amount">Montant reçu (€)</label>
            <input type="number" id="amount" name="amount"
                   step="0.01" min="0.01" required
                   placeholder="ex: 12.50">
            <div class="form-hint">Saisir le montant net effectivement reçu sur votre compte.</div>
        </div>

        <div class="form-group">
            <label for="notes">Note <span style="font-weight:400; color:var(--text-dim);">(optionnel)</span></label>
            <input type="text" id="notes" name="notes"
                   placeholder="ex: Dividende Q1 2025">
        </div>

        <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
            <button type="submit" class="btn btn-success">Enregistrer le dividende</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-ghost">Annuler</a>
        </div>

    </form>
</div>

<script>
document.getElementById('date').valueAsDate = new Date();
</script>

{% endblock %}
